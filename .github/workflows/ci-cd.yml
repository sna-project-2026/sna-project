name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Tests
        run: uv run pytest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    needs: build-and-test
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible Docker Collection
        run: ansible-galaxy collection install community.docker

      - name: Generate Local Inventory
        run: |
          cat <<EOF > infra/inventory.ini
          [staging]
          127.0.0.1 ansible_connection=local
          EOF

      - name: Run Ansible Playbook for Staging
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          ansible-playbook -i infra/inventory.ini infra/deploy.yml \
          --limit staging \
          -e "ghcr_username=${{ github.actor }}" \
          -e "ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
          -e "image_repo=$LOWERCASE_REPO"

  deploy-production:
    needs: deploy-staging
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key and Known Hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Uses the environment-specific IP
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Generate Production Inventory
        run: |
          cat <<EOF > infra/inventory.ini
          [production]
          ${{ secrets.VM_IP }}

          [all:vars]
          ansible_user=deploy
          ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

      - name: Run Ansible Playbook for Production
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          ansible-playbook -i infra/inventory.ini infra/deploy.yml \
          --limit production \
          -e "ghcr_username=${{ github.actor }}" \
          -e "ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
          -e "image_repo=$LOWERCASE_REPO"
